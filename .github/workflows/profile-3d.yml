name: GitHub-Profile-3D-Contrib

on:
  schedule: # 03:00 JST == 18:00 UTC
    - cron: "0 18 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    name: generate-github-profile-3d-contrib
    steps:
      - uses: actions/checkout@v4
      - uses: yoshi389111/github-profile-3d-contrib@0.7.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          USERNAME: ${{ github.repository_owner }}

      - name: Checkout output branch
        uses: actions/checkout@v4
        with:
          ref: output
          path: output-branch
          fetch-depth: 0

      - name: Publish profile 3D SVGs
        run: |
          set -euo pipefail
          rm -rf output-branch/profile-3d-contrib
          mkdir -p output-branch/profile-3d-contrib
          cp -R profile-3d-contrib/. output-branch/profile-3d-contrib/
          cd output-branch
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add profile-3d-contrib
          if git diff --cached --quiet; then
            echo "No profile 3D changes to publish"
            exit 0
          fi
          git commit -m "Update profile-3d-contrib - [Skip GitHub Action]"
          git pull --rebase origin output
          git push origin HEAD:output
