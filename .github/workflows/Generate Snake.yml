# GitHub Action for generating a contribution graph with a snake eating your contributions.

name: generate animation

on:
  # run automatically every 24 hours
  schedule:
    - cron: "0 0 * * *"
  
  # allows to manually run the job at any time
  workflow_dispatch:
  
  # run on every push on the main/master branch
  push:
    branches:
    - main
    - master
    
  

jobs:
  generate:
    permissions: 
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 5
    
    steps:
      # generates a snake game from a github user (<github_user_name>) contributions graph, output a svg animation at <svg_out_path>
      - name: generate github-contribution-grid-snake.svg
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark

      - name: Checkout output branch
        uses: actions/checkout@v4
        with:
          ref: output
          path: output-branch
          fetch-depth: 0

      - name: Publish snake SVGs
        run: |
          set -euo pipefail
          cp dist/github-contribution-grid-snake.svg output-branch/github-contribution-grid-snake.svg
          cp dist/github-contribution-grid-snake-dark.svg output-branch/github-contribution-grid-snake-dark.svg
          cd output-branch
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add github-contribution-grid-snake.svg github-contribution-grid-snake-dark.svg
          if git diff --cached --quiet; then
            echo "No snake changes to publish"
            exit 0
          fi
          git commit -m "Update contribution snake - [Skip GitHub Action]"
          git pull --rebase origin output
          git push origin HEAD:output
