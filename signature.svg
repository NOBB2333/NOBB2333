<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 320 120" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    svg { color: #111; }
    @media (prefers-color-scheme: dark) {
      svg { color: #e5e5e5; }
    }
    @keyframes draw-text {
      0%, 12% { stroke-dashoffset: 760; opacity: 0.2; }
      35%, 88% { stroke-dashoffset: 0; opacity: 1; }
      100% { stroke-dashoffset: -40; opacity: 0.92; }
    }
    @keyframes draw-tail {
      0%, 20% { stroke-dashoffset: 240; opacity: 0; }
      38%, 90% { stroke-dashoffset: 0; opacity: 1; }
      100% { stroke-dashoffset: -12; opacity: 0.95; }
    }
    @keyframes blink {
      0%, 42% { opacity: 0; transform: scale(0.6); }
      48%, 92% { opacity: 1; transform: scale(1); }
      100% { opacity: 0.8; transform: scale(0.96); }
    }
    .sig {
      fill: none;
      stroke: currentColor;
      stroke-width: 2.4;
      stroke-linecap: round;
      stroke-linejoin: round;
      stroke-dasharray: 760;
      stroke-dashoffset: 760;
      animation: draw-text 5s ease-in-out infinite;
    }
    .tail {
      fill: none;
      stroke: currentColor;
      stroke-width: 2.8;
      stroke-linecap: round;
      stroke-dasharray: 240;
      stroke-dashoffset: 240;
      animation: draw-tail 5s ease-in-out infinite;
    }
    .dot {
      fill: currentColor;
      opacity: 0;
      transform-origin: center;
      animation: blink 5s ease-in-out infinite;
    }
  </style>
  <text
    x="18"
    y="76"
    class="sig"
    font-family="'Brush Script MT', 'Segoe Script', 'Snell Roundhand', cursive"
    font-size="54"
    font-style="italic"
    letter-spacing="1"
  >
    NOBB2333
  </text>
  <path class="tail" d="M28 95 C112 118, 220 116, 302 86" />
  <circle class="dot" cx="294" cy="87" r="2.6" />
</svg>
